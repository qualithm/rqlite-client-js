# Generated by dx/scripts/ci-sync from ci-templates/bun-lib.yaml.
# Do not edit directly — change the template and re-run ci-sync.

name: CI

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.f.outputs.code }}
      is-main: ${{ steps.tier.outputs.is-main }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!.vscode/**'
              - '!docker/**'
              - '!LICENSE'
      - id: tier
        run: |
          if [[ "${{ github.base_ref }}" == "main" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-main=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run lint

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run format

  typecheck:
    name: Type Check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test-bun:
    name: Test (Bun ${{ matrix.bun-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        bun-version:
          ${{ fromJSON(needs.changes.outputs.is-main == 'true' && '["1.3","latest"]' ||
          '["latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun-version }}
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
      - run: bun --version

  test-node:
    name: Test (Node.js ${{ matrix.node-version }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version:
          ${{ fromJSON(needs.changes.outputs.is-main == 'true' && '["20","22"]' || '["22"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: npx vitest run src/__tests__/unit
      - run: node --version

  test-deno:
    name: Test (Deno)
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: deno run -A npm:vitest run src/__tests__/unit
      - run: deno --version

  validate-runtime:
    name: Validate Runtime Exports
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run validate:runtime

  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage:unit
      - name: Enforce coverage threshold (>=80%)
        run: |
          awk '/^LF:/ {lf+=substr($0,4)} /^LH:/ {lh+=substr($0,4)} END {
            if (lf == 0) { print "No LF records in lcov.info"; exit 1 }
            pct = (lh / lf) * 100
            printf "Line coverage: %.2f%% (%d/%d)\n", pct, lh, lf
            if (pct + 0 < 80) { print "Coverage below 80% threshold"; exit 1 }
          }' coverage/lcov.info
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  ci-required:
    name: CI Required
    if: always()
    needs:
      [changes, lint, format, typecheck, test-bun, test-node, test-deno, validate-runtime, coverage]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify dependent jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
          echo "$NEEDS" | jq -e '[.[] | .result] | all(. == "success" or . == "skipped")' \
            || { echo "::error::One or more required jobs failed or were cancelled"; exit 1; }
