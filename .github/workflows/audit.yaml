name: Security Audit

on:
    schedule:
        - cron: "0 6 * * *" # Daily at 06:00 UTC
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    audit:
        name: Dependency Audit
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v5
            - uses: oven-sh/setup-bun@v2
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Audit dependencies
              run: bun audit
