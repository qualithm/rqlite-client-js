# Generated by dx/scripts/audit-sync from ci-templates/audit-bun.yaml.
# Do not edit directly — change the template and re-run audit-sync.

name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit dependencies
        id: scan
        continue-on-error: true
        run: bun audit
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: bun audit found a vulnerability"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: bun audit found a vulnerability"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1
