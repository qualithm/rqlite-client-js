services:
  rqlite:
    image: rqlite/rqlite:${RQLITE_VERSION:-10.2.7}@sha256:507da6e6bcf41011f784bcbe4dce5900f84aa027ad6283a50a45c4238e969d3a
    ports:
      - "4001:4001"
      - "4002:4002"
    command: >
      -node-id=1 -http-addr=0.0.0.0:4001 -raft-addr=0.0.0.0:4002
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/readyz"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
