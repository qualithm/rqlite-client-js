services:
  rqlite:
    image: rqlite/rqlite:${RQLITE_VERSION:-9.4.5}@sha256:cf4d7d35e0ce1532e4578ec580dda63554853c010371e3cbe2676a95f5003fb7
    ports:
      - "4001:4001"
      - "4002:4002"
    command: >
      -node-id=1 -http-addr=0.0.0.0:4001 -raft-addr=0.0.0.0:4002
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/readyz"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
